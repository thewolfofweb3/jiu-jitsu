<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jiu Jitsu Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-frame">
      <header class="app-header">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Jiu Jitsu Lab</span>
        </div>
        <nav class="global-actions" aria-label="Lab actions">
          <button id="share-move" type="button" aria-label="Share move">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7" />
              <path d="M12 15V3M7 8l5-5 5 5" />
            </svg>
          </button>
          <button id="community-toggle" type="button" aria-label="Open inbox and community">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5h16v10H7l-3 3V5Z" />
              <path d="M8 9h8M8 12h5" />
            </svg>
          </button>
        </nav>
      </header>

      <section class="mat-panel" aria-label="Mat canvas">
        <div class="center-empty">
          <div class="mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div class="shortcuts">
            <div class="shortcut-row">
              <span>Toggle file tree</span>
              <div class="keys"><kbd>Ctrl</kbd><span>+</span><kbd>B</kbd></div>
            </div>
            <div class="shortcut-row">
              <span>Toggle editor</span>
              <div class="keys"><kbd>Ctrl</kbd><span>+</span><kbd>Alt</kbd><span>+</span><kbd>E</kbd></div>
            </div>
            <div class="shortcut-row">
              <span>New file</span>
              <div class="keys"><kbd>Ctrl</kbd><span>+</span><kbd>Alt</kbd><span>+</span><kbd>N</kbd></div>
            </div>
            <div class="shortcut-row">
              <span>New chat</span>
              <div class="keys"><kbd>Ctrl</kbd><span>+</span><kbd>Shift</kbd><span>+</span><kbd>L</kbd></div>
            </div>
          </div>
        </div>
      </section>

      <section class="chat-panel" aria-label="AI chat">
        <div class="chat-stage" id="chat-stage">
          <div class="messages" id="messages" aria-live="polite"></div>
        </div>

        <form class="composer" id="composer">
          <label class="sr-only" for="prompt">Describe the exact position you want to test.</label>
          <textarea id="prompt" rows="3" placeholder="Describe the exact position you want to test."></textarea>

          <footer class="composer-footer">
            <div class="attach-wrap">
              <button class="ghost-icon" id="attach-toggle" type="button" aria-label="Attach material">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" />
                </svg>
              </button>
              <div class="attach-menu" id="attach-menu" aria-hidden="true">
                <button type="button" data-attach="Upload video">Upload video</button>
                <button type="button" data-attach="Paste YouTube link">Paste YouTube link</button>
                <button type="button" data-attach="Attach image/reference">Attach image/reference</button>
                <button type="button" data-attach="Import move file">Import move file</button>
              </div>
            </div>
            <div class="input-actions">
              <button class="ghost-icon" id="voice-toggle" type="button" aria-label="Voice input">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z" />
                  <path d="M19 11a7 7 0 0 1-14 0M12 18v3M8 21h8" />
                </svg>
              </button>
              <button class="send-button" type="submit" aria-label="Send">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 19V5M5 12l7-7 7 7" />
                </svg>
              </button>
            </div>
          </footer>
        </form>
      </section>

      <aside class="drawer" id="community-drawer" aria-hidden="true" aria-label="Inbox and community drawer">
        <header class="drawer-header">
          <span>Network</span>
          <button id="drawer-close" type="button" aria-label="Close drawer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </header>
        <nav class="drawer-tabs" aria-label="Drawer tabs">
          <button class="active" type="button" data-tab="inbox">Inbox</button>
          <button type="button" data-tab="friends">Friends</button>
          <button type="button" data-tab="community">Community</button>
          <button type="button" data-tab="saved">Saved</button>
        </nav>
        <div class="drawer-content" id="drawer-content">
          <p class="drawer-kicker">Inbox</p>
          <h2>No move packages yet</h2>
          <p>Shared moves will appear here with positions, grips, pressure points, timing steps, AI notes, simulation state, and source references.</p>
        </div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
